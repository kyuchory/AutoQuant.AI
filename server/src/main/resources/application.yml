# ===================================================================
# 1. Server Configuration
# ===================================================================
server:
  port: 8080

spring:
  application:
    name: invest-ai

  # .env 파일에서 환경 변수 로드
  config:
    import: "optional:file:.env[.properties]"

  # ===================================================================
  # 2. Docker MySQL Connection
  # ===================================================================
  datasource:
    url: jdbc:mysql://localhost:3306/invest_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ===================================================================
  # 3. JPA / Hibernate Configuration
  # ===================================================================
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    hibernate:
      ddl-auto: update

  # ===================================================================
  # 4. Docker Redis Configuration
  # ===================================================================
  data:
    redis:
      host: localhost
      port: 6379

  # ===================================================================
  # 5. Docker RabbitMQ Configuration
  # ===================================================================
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

# ===================================================================
# 6. Naver Open API Configuration
# ===================================================================
naver:
  api:
    url: "https://openapi.naver.com/v1/search/news.json"
    client-id: ${NAVER_CLIENT_ID}
    client-secret: ${NAVER_CLIENT_SECRET}


# ===================================================================
# 7. KIS (한국투자증권) Open API Configuration
# ===================================================================
kis:
  api:
    # 모의투자 계좌 기준 REST API base URL (실전투자: https://openapi.koreainvestment.com)
    # ⚠️ 모의투자 서버는 기본 443 포트가 아닌 29443 포트를 사용합니다
    rest-base-url: "https://openapivts.koreainvestment.com:29443"
    # WebSocket 실시간 시세 엔드포인트
    websocket-endpoint: "ws://ops.koreainvestment.com:31000"
    # KIS Developers에서 발급받은 APP Key
    app-key: ${KIS_APP_KEY}
    # KIS Developers에서 발급받은 APP Secret
    app-secret: ${KIS_APP_SECRET}
    # 모의투자 계좌번호 — KIS 주문 바디 CANO (8자리, 실전계좌로 변경 시 교체)
    account-no: "50197569"
    # 모의투자 계좌 상품코드 — KIS 주문 바디 ACNT_PRDT_CD (모의투자 고정값 "01")
    account-prdt-cd: "01"

# ===================================================================
# 8. JWT Configuration
# ===================================================================
jwt:
  secret-key: "Y29tLmV4YW1wbGUuaW52ZXN0LWFpLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi0yMDI2"
  access-token-expiration: 3600
  refresh-token-expiration: 1209600

# ===================================================================
# 9. Kakao OAuth2 Configuration
# ===================================================================
kakao:
  oauth:
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    redirect-uri: "http://localhost:3000/callback/kakao"
    auth-url: "https://kauth.kakao.com/oauth/authorize"
    token-url: "https://kauth.kakao.com/oauth/token"
    user-info-url: "https://kapi.kakao.com/v2/user/me"

# ===================================================================
# 10. OpenAI API Configuration
# ===================================================================
openai:
  api-key: ${OPENAI_API_KEY}
  base-url: "https://api.openai.com/v1"
  model: "gpt-4o-mini"
